name: release
# Tag a version (e.g. v1987) -> publish the committed menu.p plus a version.json
# manifest as the GitHub Release assets. The osos-esp32 bridge mirrors these so the
# ZX81 can auto-update. menu.p is built locally (the maziac.zx81-bastop tokenizer
# needs a headless Electron run that isn't worth reproducing in CI), so this workflow
# only packages the already-committed artifact — keep menu.p in sync with VER.
on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Derive OSOS version from build_menu.py (VER)
        id: ver
        run: |
          V=$(grep -E '^VER="V' build_menu.py | head -1 | sed -E 's/.*"V([0-9]+)".*/\1/')
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "OSOS version: $V (tag ${GITHUB_REF_NAME})"

      - name: Generate version.json
        run: printf '{"version":"%s"}\n' "${{ steps.ver.outputs.version }}" > version.json

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            menu.p
            version.json
